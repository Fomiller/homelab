apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wikijs

resources:
- namespace.yaml
- external-secrets.yaml
- ingressroute.yaml

helmCharts:
- name: wiki
  repo: https://charts.js.wiki
  releaseName: wikijs
  includeCRDs: true
  version: 3.0.0
  namespace: wikijs
  valuesFile: values.yaml
