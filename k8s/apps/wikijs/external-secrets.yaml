# Key names (postgresql-username/postgresql-password) match what the wiki
# chart's own postgresql.existingSecretUserKey/existingSecretKey defaults
# expect (see values.yaml postgresql.existingSecret).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wikijs-secrets
  namespace: wikijs
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-clustersecretstore
    kind: ClusterSecretStore
  target:
    name: wikijs-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dev/fomiller/homelab/wikijs-secrets
