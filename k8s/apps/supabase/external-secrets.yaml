---
# Bootstrap credential, terraform-controlled (infra/units/aws/global/secrets
# doppler_sa_token -> AWS Secrets Manager), same pattern as
# tailscale-operator-creds / homepage / romm. This ExternalSecret materializes
# it as the doppler-token-sa Secret that the SecretStore below reads.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: doppler-token-sa
  namespace: supabase
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-clustersecretstore
    kind: ClusterSecretStore
  target:
    name: doppler-token-sa
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dev/fomiller/homelab/doppler-token-sa
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: doppler-supabase
  namespace: supabase
spec:
  provider:
    doppler:
      auth:
        secretRef:
          dopplerToken:
            name: doppler-token-sa
            key: dopplerToken
      project: supabase
      config: dev
---
# Only the secrets actually consumed in this deployment (see values.yaml):
# db + meta + dashboard are the only components with real credentials since
# auth/rest/realtime/storage/functions/analytics/vector/imgproxy are all
# disabled - this is a Studio + postgres-meta + Postgres deployment, not the
# full Supabase stack. Kong stays enabled only as the basic-auth gate in
# front of Studio. The chart's own jwt/apikey/smtp/s3/analytics/realtime
# secrets are left at their packaged placeholder values (values.yaml
# defaults) since nothing reads them without those services running.
# Doppler project "supabase"/config "dev" needs: DB_PASSWORD (the postgres
# superuser password), META_CRYPTO_KEY (openssl rand -hex 32),
# DASHBOARD_USERNAME/DASHBOARD_PASSWORD (Studio's basic-auth login, enforced
# by Kong's dashboard consumer), OPENAI_API_KEY (powers Studio's SQL Editor
# AI Assistant - optional feature, but the env var is read unconditionally
# so the key must exist even if you don't want it wired up).
# db-database isn't a secret - it's templated in as a literal below because
# the chart's db StatefulSet pulls every secret.db.* field via secretKeyRef
# once secretRef is set, with no plain-value fallback.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: supabase-secrets
  namespace: supabase
spec:
  refreshInterval: 30s
  secretStoreRef:
    kind: SecretStore
    name: doppler-supabase
  target:
    name: supabase-secrets
    creationPolicy: Owner
    template:
      # template.data defaults to *replacing* the whole Secret's data with
      # just the templated keys - Merge is required so the Doppler-sourced
      # data: entries below survive alongside the literal db-database key.
      mergePolicy: Merge
      data:
        db-database: "postgres"
  data:
    - secretKey: db-password
      remoteRef:
        key: DB_PASSWORD
    - secretKey: meta-crypto-key
      remoteRef:
        key: META_CRYPTO_KEY
    - secretKey: dashboard-username
      remoteRef:
        key: DASHBOARD_USERNAME
    - secretKey: dashboard-password
      remoteRef:
        key: DASHBOARD_PASSWORD
    - secretKey: dashboard-openai-key
      remoteRef:
        key: OPENAI_API_KEY
