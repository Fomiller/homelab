---
# Bootstrap credential, terraform-controlled (infra/units/aws/global/secrets
# doppler_sa_token -> AWS Secrets Manager), same pattern as
# tailscale-operator-creds / homepage. This ExternalSecret materializes it as
# the doppler-token-sa Secret that the SecretStore below reads.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: doppler-token-sa
  namespace: romm
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-clustersecretstore
    kind: ClusterSecretStore
  target:
    name: doppler-token-sa
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dev/fomiller/homelab/doppler-token-sa
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: doppler-romm
  namespace: romm
spec:
  provider:
    doppler:
      auth:
        secretRef:
          dopplerToken:
            name: doppler-token-sa
            key: dopplerToken
      project: romm
      config: dev
---
# Explicit key mapping (not a find/regexp) since values.yaml's mariadb/redis
# subcharts and the romm app itself both read distinct key names out of this
# one Secret (see values.yaml env.DB_PASSWD, env.REDIS_PASSWORD,
# mariadb.auth.existingSecret, redis.auth.existingSecret). Doppler project
# "romm"/config "dev" needs: ROMM_AUTH_SECRET_KEY (openssl rand -hex 32),
# MARIADB_ROOT_PASSWORD, MARIADB_PASSWORD, REDIS_PASSWORD, plus the Chef's
# Choice metadata provider keys (IGDB_CLIENT_ID, IGDB_CLIENT_SECRET,
# STEAMGRIDDB_API_KEY, RETROACHIEVEMENTS_API_KEY) — those last 4 aren't
# stored directly in "romm" but pulled in via Doppler config inheritance
# from the igdb/steam-grid-db/retro-achievements projects.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: romm-secrets
  namespace: romm
spec:
  refreshInterval: 30s
  secretStoreRef:
    kind: SecretStore
    name: doppler-romm
  target:
    name: romm-secrets
    creationPolicy: Owner
  data:
    - secretKey: ROMM_AUTH_SECRET_KEY
      remoteRef:
        key: ROMM_AUTH_SECRET_KEY
    - secretKey: mariadb-root-password
      remoteRef:
        key: MARIADB_ROOT_PASSWORD
    - secretKey: mariadb-password
      remoteRef:
        key: MARIADB_PASSWORD
    - secretKey: redis-password
      remoteRef:
        key: REDIS_PASSWORD
    - secretKey: igdb-client-id
      remoteRef:
        key: IGDB_CLIENT_ID
    - secretKey: igdb-client-secret
      remoteRef:
        key: IGDB_CLIENT_SECRET
    - secretKey: steamgriddb-api-key
      remoteRef:
        key: STEAMGRIDDB_API_KEY
    - secretKey: retroachievements-api-key
      remoteRef:
        key: RETROACHIEVEMENTS_API_KEY
