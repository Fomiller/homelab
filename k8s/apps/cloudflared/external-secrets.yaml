---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-tunnel-creds
  namespace: cloudflared
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-clustersecretstore
    kind: ClusterSecretStore
  target:
    name: cloudflare-tunnel-creds
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dev/fomiller/homelab/cloudflare-tunnel-creds
