apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: homepage

resources:
- namespace.yaml
- ingressroute.yaml

helmCharts:
- name: homepage
  repo: https://jameswynn.github.io/helm-charts
  releaseName: homepage
  includeCRDs: true
  version: 2.1.0
  namespace: homepage
  valuesFile: values.yaml
