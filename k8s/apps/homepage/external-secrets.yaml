---
# Bootstrap credential, terraform-controlled (infra/units/aws/global/secrets
# doppler_sa_token -> AWS Secrets Manager), same pattern as
# tailscale-operator-creds. This ExternalSecret materializes it as the
# doppler-token-sa Secret that the SecretStore below reads.
#
# The token itself is a Doppler Service Account API token (viewer, all
# projects) rather than a per-project Service Token. Since it isn't
# restricted to a single config, project/config must be set explicitly
# below (unlike a Service Token, which is self-scoped). Same bootstrap
# secret can be reused to back additional SecretStores for other apps'
# Doppler projects later — just point a new store at a different
# project/config, no new token needed. Wider blast radius than a
# homepage-only token if it leaks: viewer on every Doppler project, not
# just this one.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: doppler-token-sa
  namespace: homepage
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-clustersecretstore
    kind: ClusterSecretStore
  target:
    name: doppler-token-sa
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dev/fomiller/homelab/doppler-token-sa
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: doppler-homepage
  namespace: homepage
spec:
  provider:
    doppler:
      auth:
        secretRef:
          dopplerToken:
            name: doppler-token-sa
            key: dopplerToken
      project: homepage
      config: dev
---
# All HOMEPAGE_VAR_* secrets live in the same Doppler project/config, so one
# ExternalSecret pulls all of them by name pattern into a single managed
# Secret, referenced as one envFrom entry in values.yaml.
#
# HOMEPAGE_VAR_TAILSCALE_KEY is a Tailscale API access token, max 90-day
# lifetime (Tailscale enforces this, no long-lived option). Homepage's
# widget only supports a static Bearer token, not OAuth client credentials,
# so there's no automated refresh — regenerate in the Tailscale admin
# console (Settings > Keys) and update the value in Doppler when it
# expires; this ExternalSecret picks up the change within refreshInterval.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-secrets
  namespace: homepage
spec:
  refreshInterval: 30s
  secretStoreRef:
    kind: SecretStore
    name: doppler-homepage
  target:
    name: homepage-secrets
    creationPolicy: Owner
  dataFrom:
    - find:
        name:
          regexp: "^HOMEPAGE_VAR_"
