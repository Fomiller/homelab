apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: authentik

resources:
- namespace.yaml
- external-secrets.yaml
- ingressroute.yaml

helmCharts:
- name: authentik
  repo: https://charts.goauthentik.io
  releaseName: authentik
  includeCRDs: true
  version: 2026.5.3
  namespace: authentik
  valuesFile: values.yaml
