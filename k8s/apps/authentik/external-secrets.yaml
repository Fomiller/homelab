---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-clustersecretstore
    kind: ClusterSecretStore
  target:
    name: authentik-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dev/fomiller/homelab/authentik-secrets
